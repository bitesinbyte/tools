<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free browser-based developer tools: JSON formatter, YAML validator, JWT decoder, text compare, encode/decode, CSV delimiter changer, cron expression tester, and JSON/YAML converters."
    />
    <meta
      name="keywords"
      content="JSON formatter, YAML validator, JWT decoder, text compare, encode decode, CSV delimiter, cron tester, JSON to YAML, YAML to JSON, developer tools, online tools"
    />
    <title>BitesInByte - Tools</title>
    <base href="/" />
    <link rel="icon" type="image/png" href="favicons/favicon.ico" />
    <link rel="stylesheet" href="css/app.css" />
    <link href="BitesInByte.Tools.styles.css" rel="stylesheet" />

    <link
      href="https://fonts.googleapis.com/css?family=Roboto:300,400,500,700&display=swap"
      rel="stylesheet"
    />
    <link href="_content/MudBlazor/MudBlazor.min.css" rel="stylesheet" />
    <style>
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <link href="manifest.webmanifest" rel="manifest" />
    <link
      rel="apple-touch-icon"
      sizes="512x512"
      href="favicons/android-chrome-512x512.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="192x192"
      href="favicons/android-chrome-192x192.png"
    />
  </head>

  <body>
    <div id="app" style="margin: 0 auto; width: 100vw; height: 100vh">
      <div style="text-align: center; padding-top: 1rem; color: purple; font-size: 16pt">
        Loading...
      </div>
      <div style="text-align: center; margin-top: 1rem">
        <span
          role="status"
          aria-hidden="true"
          style="display: inline-block; width: 36px; height: 36px; color: purple; border: 4px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 0.75s linear infinite"
        ></span>
      </div>
      <div style="text-align: center">
        <img
          src="favicons/android-chrome-512x512.png"
          style="width: 30%"
          alt="logo"
        />
      </div>
    </div>

    <div id="blazor-error-ui">
      An unhandled error has occurred. <a href="" class="reload">Reload</a>
      <a class="dismiss">&#x1f5d9;</a>
    </div>
    <script>
      window.downloadFileFromStream = async (
        fileName,
        contentStreamReference
      ) => {
        const arrayBuffer = await contentStreamReference.arrayBuffer();
        const blob = new Blob([arrayBuffer]);
        const url = URL.createObjectURL(blob);
        const anchorElement = document.createElement("a");
        anchorElement.href = url;
        anchorElement.download = fileName ?? "";
        anchorElement.click();
        anchorElement.remove();
        URL.revokeObjectURL(url);
      };
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
    <script src="_content/MudBlazor/MudBlazor.min.js"></script>

    <script src="_content/BlazorMonaco/jsInterop.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/loader.js"></script>
    <script src="_content/BlazorMonaco/lib/monaco-editor/min/vs/editor/editor.main.js"></script>
    <script src="scripts/clipboard.js"></script>

    <!-- Google Analytics -->
    <script
      async
      src="https://www.googletagmanager.com/gtag/js?id=G-F9EC1KWJNY"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-F9EC1KWJNY");
    </script>

    <script>
      navigator.serviceWorker.register("service-worker.js");
    </script>
  </body>
</html>
